name = "hkgd-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# === D1 Database Configuration ===
[[d1_databases]]
binding = "DB"
database_name = "hkgd-db"
database_id = "38dec10e-48f3-4817-b227-a825752d9f68"

# === Environment Variables ===
[vars]
ENVIRONMENT = "production"
INDEXNOW_KEY = "56c7141e78ad1f1fd11ca5a7929f8957"
SITE_HOSTNAME = "hkgdl.dpdns.org"

# Secrets (set via: wrangler secret put JWT_SECRET)
# JWT_SECRET - your JWT signing secret
# ADMIN_PASSWORD - your admin login password
# GOOGLE_SHEETS_API_KEY - Google Sheets API key (for admin Google Sheets sync)
# GOOGLE_SHEET_ID - the spreadsheet ID from the Google Sheets URL
# GOOGLE_SHEET_RANGE - (optional) sheet range, default: 'Classic Demon'!A1:GX2000

# === Custom Domain Routes ===
[[routes]]
pattern = "api.hkgdl.dpdns.org/*"
zone_name = "hkgdl.dpdns.org"

[[routes]]
pattern = "api.hkgdl.dpdns.org"
zone_name = "hkgdl.dpdns.org"

[[routes]]
pattern = "hkgdl.dpdns.org/api/*"
zone_name = "hkgdl.dpdns.org"

[[routes]]
pattern = "hkgdl.dpdns.org/api"
zone_name = "hkgdl.dpdns.org"

# === Local Development ===
[dev]
port = 8787
local_protocol = "http"

# === Cron Trigger - Daily AREDL Sync at 12:00 PM GMT+8 (04:00 UTC) ===
[triggers]
crons = ["0 4 * * *", "0 1 * * *"]
